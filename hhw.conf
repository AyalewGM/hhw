<VirtualHost *:80>
    ServerName hhw.com
    ServerAlias www.hhw.com
    ServerAdmin admin@hhw.com

    WSGIScriptAlias / /var/www/hhw/hhw.wsgi
    WSGIDaemonProcess hhw python-path=/var/www/hhw:/var/www/hhw/env/lib/python3.10/site-packages
    WSGIProcessGroup hhw

    <Directory /var/www/hhw/nutras/>
        Order allow,deny
        Allow from all
        Require all granted
    </Directory>

    Alias /static /var/www/hhw/nutras/static
    <Directory /var/www/hhw/nutras/static/>
        Order allow,deny
        Allow from all
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/hhw-error.log
    CustomLog ${APACHE_LOG_DIR}/hhw-access.log combined
</VirtualHost>
